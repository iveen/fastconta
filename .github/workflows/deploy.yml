name: CD - Despliegue a Oracle Cloud
on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Desplegar a producción
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Verificar secrets configurados
        run: |
          if [ -z "${{ secrets.ORACLE_HOST }}" ]; then echo "❌ ORACLE_HOST no configurado"; exit 1; fi
          if [ -z "${{ secrets.ORACLE_USER }}" ]; then echo "❌ ORACLE_USER no configurado"; exit 1; fi
          if [ -z "${{ secrets.ORACLE_SSH_KEY }}" ]; then echo "❌ ORACLE_SSH_KEY no configurado"; exit 1; fi
          echo "✅ Todos los secrets están configurados"

      - name: Desplegar vía SSH a Oracle Cloud
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          host_key_checking: false  
          script: |
            cd /opt/fastconta || { echo "❌ Directorio no existe"; exit 1; }
            git pull origin main
            
            if [ ! -f .env ]; then
              echo "❌ Archivo .env no encontrado"
              exit 1
            fi
            
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
            
            echo "✅ Despliegue completado. Estado de contenedores:"
            docker compose -f docker-compose.prod.yml ps