name: CD - Despliegue a Oracle Cloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Desplegar a producción
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Verificar secrets configurados
        run: |
          if [ -z "${{ secrets.ORACLE_HOST }}" ]; then echo "❌ ORACLE_HOST no configurado"; exit 1; fi
          if [ -z "${{ secrets.ORACLE_USER }}" ]; then echo "❌ ORACLE_USER no configurado"; exit 1; fi
          if [ -z "${{ secrets.ORACLE_SSH_KEY }}" ]; then echo "❌ ORACLE_SSH_KEY no configurado"; exit 1; fi
          echo "✅ Todos los secrets están configurados"

      - name: Desplegar vía SSH a Oracle Cloud
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          debug: true  # Descomenta esta línea solo si el despliegue falla, para ver más detalles
          script: |
            # 1. Ir al directorio correcto del proyecto
            cd /opt/fastconta || { echo "❌ Directorio /opt/fastconta no existe"; exit 1; }
            
            # 2. Obtener los últimos cambios de GitHub
            git pull origin main
            
            # 3. Verificar que exista el archivo .env (crítico para Docker)
            if [ ! -f .env ]; then
              echo "❌ Archivo .env no encontrado en /opt/fastconta"
              exit 1
            fi
            
            # 4. Detener contenedores actuales de forma limpia
            docker compose -f docker-compose.prod.yml down
            
            # 5. Construir y levantar los contenedores