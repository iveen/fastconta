name: CD - Despliegue a Oracle Cloud
on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Desplegar a producción
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Verificar secrets configurados
        run: |
          if [ -z "${{ secrets.ORACLE_HOST }}" ]; then echo "❌ ORACLE_HOST no configurado"; exit 1; fi
          if [ -z "${{ secrets.ORACLE_USER }}" ]; then echo "❌ ORACLE_USER no configurado"; exit 1; fi
          if [ -z "${{ secrets.ORACLE_SSH_KEY }}" ]; then echo "❌ ORACLE_SSH_KEY no configurado"; exit 1; fi
          echo "✅ Todos los secrets están configurados"

      - name: Desplegar vía SSH a Oracle Cloud
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -e
            cd /opt/fastconta

            if [ ! -f .env ]; then
              echo "❌ Archivo .env no encontrado"
              exit 1
            fi

            echo "🔄 Obteniendo últimos cambios..."
            git fetch origin main
            git reset --hard origin/main

            echo "🔨 Construyendo nuevas imágenes..."
            docker compose -f docker-compose.prod.yml build --pull

            echo "🚀 Aplicando despliegue..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "✅ Verificando estado..."
            sleep 10
            docker compose -f docker-compose.prod.yml ps

            echo "🏥 Health check del backend..."
            if curl -f -s http://localhost:8001/docs > /dev/null; then
              echo "✅ Backend respondiendo correctamente"
            else
              echo "⚠️ Backend no responde, mostrando logs..."
              docker compose -f docker-compose.prod.yml logs --tail=50 backend
              exit 1
            fi

            echo "🧹 Limpiando imágenes antiguas..."
            docker image prune -f

            echo "✅ Despliegue completado exitosamente"