name: CI - Frontend Validación

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'

jobs:
  frontend-ci:
    name: Node 22 - Vue + pnpm
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # ✅ Fijar versión LTS actual (evita el error de 'lts')
          cache: 'pnpm'
          cache-dependency-path: 'frontend/pnpm-lock.yaml'

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9 # ✅ Versión estable recomendada (puedes usar 10 u 11 si tu proyecto lo requiere)
          run_install: false

      - name: Instalar dependencias
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Validar build de producción
        working-directory: ./frontend
        run: pnpm run build