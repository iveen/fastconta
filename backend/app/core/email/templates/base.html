<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ subject | default("FastConta") }}{% endblock %}</title>
    <style>
        {{ shared_css | safe }}
    </style>
</head>
<body>
    <table role="presentation" class="email-wrapper">
        <tr>
            <td align="center">
                <div class="email-container">
                    <!-- Header con logo -->
                    <div class="email-header">
                        <table role="presentation" class="logo-table">
                            <tr>
                                <td class="logo-icon">📊</td>
                                <td>
                                    <div class="logo-text">FastConta</div>
                                    <div class="logo-subtitle">Sistema Contable Profesional</div>
                                </td>
                            </tr>
                        </table>
                    </div>

                    <!-- Contenido dinámico -->
                    <div class="email-content">
                        {% block content %}{% endblock %}
                    </div>

                    <!-- Footer -->
                    <div class="email-footer">
                        <p>© 2026 FastConta · Todos los derechos reservados</p>
                        <p>Guatemala · <a href="{{ app_url }}">fastconta.app</a></p>
                    </div>
                </div>
            </td>
        </tr>
    </table>
</body>
</html>
