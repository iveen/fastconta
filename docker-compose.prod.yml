# docker-compose.prod.yml
version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: fastconta_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fastconta
      POSTGRES_USER: fastconta
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - fastconta_net

  backend:
    build:
      context: ./backend   # Ajusta esta ruta si tu Dockerfile está en app/backend
      dockerfile: Dockerfile
    container_name: fastconta_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8001:8001"  # Exponer backend solo en localhost
    depends_on:
      - db
    networks:
      - fastconta_net

  frontend:
    build:
      context: ./frontend  # Ajusta esta ruta si tu Dockerfile está en app/frontend
      dockerfile: Dockerfile
    container_name: fastconta_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:80"  # Exponer frontend solo en localhost
    depends_on:
      - backend
    networks:
      - fastconta_net

networks:
  fastconta_net:
    driver: bridge

volumes:
  pgdata: