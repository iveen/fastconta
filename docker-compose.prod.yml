version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: fastconta_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-fastconta}
      POSTGRES_USER: ${DATABASE_USER:-fastconta}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - fastconta_net

  backend:
    build:
      context: ./backend   # ✅ CORREGIDO: Apunta a tu carpeta backend local
      dockerfile: Dockerfile
    container_name: fastconta_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8001:8001"
    depends_on:
      - db
    networks:
      - fastconta_net

  frontend:
    build:
      context: ./frontend  # ✅ CORREGIDO: Apunta a tu carpeta frontend local
      dockerfile: Dockerfile
    container_name: fastconta_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:80"
    depends_on:
      - backend
    networks:
      - fastconta_net

networks:
  fastconta_net:
    driver: bridge

volumes:
  pgdata: