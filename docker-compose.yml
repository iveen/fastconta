# fastconta/docker-compose.yml
version: '3.8'

services:
  # Base de datos PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: fastconta-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fastconta
      POSTGRES_USER: fastconta_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password_local}
    volumes:
      - fastconta_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fastconta_user -d fastconta"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # Backend FastAPI
  backend:
    build: 
      context: ./backend      # ✅ Apunta directamente a la carpeta backend
      dockerfile: Dockerfile
    container_name: fastconta-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://fastconta_user:${DB_PASSWORD:-password_local}@db:5432/fastconta
      SECRET_KEY: ${SECRET_KEY:-clave_secreta_de_prueba_123}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      TENANT_SCHEMA: public
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8001:8001"
    volumes:
      # Hot-reload para desarrollo local (mapea la carpeta app dentro del contenedor)
      - ./backend/app:/app/app
    deploy:
      resources:
        limits:
          memory: 512M

  # Frontend Vue + Nginx
  frontend:
    build:
      context: ./frontend     # ✅ Apunta directamente a la carpeta frontend
      dockerfile: Dockerfile
    container_name: fastconta-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  fastconta_postgres_data: