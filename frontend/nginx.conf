# app/frontend/nginx.conf
server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 1. Servir archivos estaticos de Vue (soporta Vue Router en modo history)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy inverso para las llamadas a la API del backend
    # "backend" es el nombre del servicio en docker-compose
    location /api/ {
        proxy_pass http://backend:8001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Permitir subida de archivos grandes (ej. XML de facturas)
        client_max_body_size 10M;
    }

    # 3. Cache agresivo para assets estaticos (JS, CSS, imagenes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}